<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SignBridge AI — Sign Language Interpreter</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0f2f8;--surface:#fff;--surface2:rgba(255,255,255,0.7);
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.05);
  --purple:#5b4fcf;--purple-l:#7c6fe0;--purple-bg:rgba(91,79,207,0.07);--purple-br:rgba(91,79,207,0.18);
  --text:#12122a;--text2:#545475;--text3:#9090b8;
  --green:#10b981;--red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;--teal:#14b8a6;
  --shadow:0 1px 16px rgba(0,0,0,0.06);--shadow2:0 8px 40px rgba(91,79,207,0.16);
  --r:14px;
}
[data-theme="dark"]{
  --bg:#0e0e1a;--surface:#161628;--surface2:rgba(22,22,40,0.8);
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.05);
  --text:#e8e8f5;--text2:#9090b8;--text3:#5a5a88;
  --purple-bg:rgba(91,79,207,0.18);--purple-br:rgba(91,79,207,0.35);
  --shadow:0 1px 16px rgba(0,0,0,0.3);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}
button{font-family:'Outfit',sans-serif;cursor:pointer;}
input,select,textarea{font-family:'Outfit',sans-serif;}

/* ── NAV ── */
nav{position:sticky;top:0;z-index:200;background:rgba(240,242,248,0.88);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;
  padding:0 1.5rem;height:58px;transition:background .3s;}
[data-theme="dark"] nav{background:rgba(14,14,26,0.9);}
.nav-logo{font-weight:800;font-size:1.1rem;color:var(--text);display:flex;align-items:center;gap:.4rem;white-space:nowrap;}
